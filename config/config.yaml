project:
  name: shrinking-villages-japan
  run_id: "run_001"
  outputs_dir: "outputs"

time:
  start: "2015-01-01"
  end: "2025-12-31"
  composite: "monthly"

gee:
  enabled: true
  cloud_project: "ee-brodnow77"
  export_prefix: "shrinking_villages"
  scale_m: 50
  boundaries_asset_id_mura: "projects/ee-brodnow77/assets/mura_jis_shp"
  boundaries_asset_id_aza: "projects/ee-brodnow77/assets/aza_shp"
  export_target: "asset"
  export_asset_folder: "projects/ee-brodnow77/assets/thesis_exports"
  keep_export_assets: false
  cloudy_pixel_percentage_max: 80
  use_batching: true
  batch_size: 500
  max_retries: 3
  max_parallel_months: 6

data:
  boundaries_path: "admin_demographics/boundaries/mura_jis.gpkg"
  boundaries_layer: "mura"
  unit_id_field: "unit_id"
  demographics_path: "admin_demographics/demographics/village_demographics.csv"
  demographics_unit_id_field: "unit_id"

features:
  compute_ndvi: true
  compute_ndbi: true
  compute_glcm: false             # DISABLED in GEE (too expensive)
  compute_glcm_local: true        # Compute GLCM locally after GEE export
  glcm_restrict_to_golden: false   # Only download GLCM rasters for golden AOI
  include_viirs: true
  glcm_source_s2: "NDBI"
  glcm_size: 3
  glcm_metrics: [contrast, entropy, homogeneity]
  glcm_scale: 100                 # 100m keeps download under GEE 50MB limit

# Label source for built-up detection
labels:
  source: "osm"                   # "osm" = OpenStreetMap building footprints
  osm_buildings_path: null        # null = download on demand, or provide path to cached .gpkg

outputs:
  features_table_csv: "outputs/final/features_table.csv"
  features_table_parquet: "outputs/final/features_table.parquet"
  run_manifest_json: "outputs/final/run_manifest.json"
  export_map_rasters: true        # Export visualization rasters for AOI_GOLDEN
  map_rasters_dir: "outputs/rasters/map_figures"

study_area:
  prefectures:
    - Aomori
    - Akita

aoi:
  mode: "full"  # "full" for production, "golden" for validation
  aoi_full_path: "admin_demographics/aoi/aoi_full.gpkg"
  aoi_golden_path: "admin_demographics/aoi/aoi_golden.gpkg"
  aoi_full_asset_id: "projects/ee-brodnow77/assets/aoi_full"
  aoi_golden_asset_id: "projects/ee-brodnow77/assets/aoi_golden"
  golden_unit_ids:
    # Aomori (5 units, 52-887 km2, north-to-south spread)
    - "mura:Aomori:02423"  # 52 km2, northernmost
    - "mura:Aomori:02387"  # 216 km2
    - "mura:Aomori:02201"  # 887 km2, largest
    - "mura:Aomori:02405"  # 84 km2
    - "mura:Aomori:02443"  # 242 km2, southernmost
    # Akita (5 units, 18-1093 km2, north-to-south spread)
    - "mura:Akita:05303"   # 202 km2, northernmost
    - "mura:Akita:05202"   # 444 km2
    - "mura:Akita:05363"   # 18 km2, smallest
    - "mura:Akita:05215"   # 1093 km2, largest
    - "mura:Akita:05207"   # 790 km2, southernmost

run_mode:
  unit_level: "mura"              # "mura" or "aza"
  fast_dev: false
  months_override: null           # null = use time.start/end, or list like ["2020-01", "2020-02"]
  unit_sample_n: 0                # 0 = all units, >0 = first N units (for testing)
  skip_existing_month_csv: true
  strict_no_empty_month: false