project:
  name: shrinking-villages-japan
  run_id: "run_001"
  outputs_dir: "outputs"

time:
  start: "2018-01-01"
  end: "2023-12-31"
  composite: "monthly"

gee:
  enabled: true
  cloud_project: "ee-brodnow77"
  #gcs_bucket: "YOUR_GCS_BUCKET"
  export_prefix: "shrinking_villages"
  scale_m: 20
  boundaries_asset_id_mura: "projects/ee-brodnow77/assets/mura_jis_shp"
  boundaries_asset_id_aza: "projects/ee-brodnow77/assets/aza_shp"
  export_target: "asset"          # allowed: "asset" | "drive"
  export_asset_folder: "projects/ee-brodnow77/assets/thesis_exports"  # create this folder in EE Assets UI
  keep_export_assets: false        # false = delete temporary assets after local download
  cloudy_pixel_percentage_max: 80
  landsat8_enabled: false
  # landsat8_collection_id: "LANDSAT/LC08/C02/T1_L2"

  # Batching settings to avoid GEE computation timeouts
  use_batching: false              # split features into batches for processing
  batch_size: 500                 # max features per batch (500 is a safe default)
  max_retries: 3                  # retry count for transient GEE failures

data:
  boundaries_path: "admin_demographics/boundaries/mura_jis.gpkg"
  boundaries_layer: "mura"
  unit_id_field: "unit_id"
  demographics_path: "admin_demographics/demographics/village_demographics.csv"
  demographics_unit_id_field: "unit_id"

features:
  compute_ndvi: true
  compute_ndbi: true
  compute_glcm: false             # DISABLED in GEE - computed locally for performance
  compute_glcm_local: true        # Compute GLCM locally after GEE export
  include_viirs: true
  glcm_source_s2: "NDBI"
  glcm_size: 3
  glcm_metrics: [contrast, entropy, homogeneity]
  glcm_scale: 30                  # scale in meters for local GLCM computation

outputs:
  features_table_csv: "outputs/final/features_table.csv"
  features_table_parquet: "outputs/final/features_table.parquet"
  run_manifest_json: "outputs/final/run_manifest.json"

study_area:
  prefectures:
    - Aomori
    - Akita

analysis_units:
  - mura
  - aza

privacy:
  aggregation_level: "mura/aza"
  boundary_authority: "Statistics Bureau of Japan"

remote_sensing_sources:
  optical_primary:
    - "Sentinel-2 MSI (10 m)"
  nightlight_optional:
    - "VIIRS-DNB (~500 m)"

run_mode:
  unit_level: "mura"   # set to "aza" when you want sub-municipal runs
  fast_dev: false              # true = direct download, no EE export tasks
  months_override: ["2020-01"]   # small range for iteration
  unit_sample_n: 10           # 0 or null = all units
  skip_existing_month_csv: true  # if true, skips months that already have CSV exports in GEE assets
  strict_no_empty_month: false            # if true, errors out on minor issues (e.g., missing data for some months)