data:
  features_table: "outputs/final/features_table.parquet"

output:
  output_dir: "preprocessing/outputs"
  parquet_path: "preprocessing/outputs/classification_ready.parquet"
  csv_path: "preprocessing/outputs/classification_ready.csv"
  report_path: "preprocessing/outputs/preprocessing_report.json"
  metadata_path: "preprocessing/outputs/feature_metadata.csv"

# Columns to DROP before processing
drop:
  meta: [unit_level, unit_code, muni_code, city_name_ja, households_total_from_popfile]

# Temporal aggregation: which stats to compute per unit
temporal_aggregation:
  # Features that get mean + std
  mean_std_features: [B2, B3, B4, B8, B11, NDVI, NDBI, viirs_mean,
                      S2_NDBI_contrast, S2_NDBI_entropy, S2_NDBI_homogeneity]
  # Features that additionally get trend slope
  trend_features: [NDVI, NDBI, viirs_mean]
  # Features that additionally get seasonal amplitude (max-min monthly mean)
  seasonal_features: [NDVI, NDBI]

# Demographic features (static per unit — just take first value)
demographic_features: [pop_total, pop_male, pop_female, households_total,
                       age_u15, age_15_64, age_65_plus, age_75_plus]

# OSM features (static per unit — just take first value)
osm_features: [osm_built_area, osm_building_count, osm_built_ratio]

# Feature engineering: derived features to compute
derived_features:
  elderly_ratio: "age_65_plus / pop_total"
  aging_index: "age_65_plus / age_u15"
  youth_ratio: "age_u15 / pop_total"
  household_size: "pop_total / households_total"

# Target variable definition
target:
  name: "shrinkage_class"
  method: "elderly_ratio_thresholds"
  thresholds:
    stable: 0.37        # elderly_ratio < 0.37 (~33rd percentile)
    shrinking: 0.42     # 0.37 <= elderly_ratio < 0.42 (~67th percentile)
    # severely_shrinking: >= 0.42
  labels: ["stable", "shrinking", "severely_shrinking"]

# Multicollinearity resolution
# Decisions based on EDA high_correlations.csv (46 pairs with |r| > 0.8)
multicollinearity:
  # Demographics: pop_total/pop_male/pop_female/households all r>0.99
  # Keep pop_total; age_65_plus (used in target); age_u15 (for aging_index)
  drop_correlated: [pop_male, pop_female, households_total,
                    age_15_64, age_75_plus]
  # Spectral: B2/B3/B4 all r>0.99 -> keep B4 (red band)
  # B8 (NIR) kept separately (r~0.9, distinct spectral role)
  drop_spectral_correlated: [B2, B3]
  # OSM: osm_built_area / osm_building_count r=0.99 -> keep osm_built_area
  drop_osm_correlated: [osm_building_count]
  # Texture: S2_NDBI_entropy / S2_NDBI_homogeneity r=-0.99 -> keep entropy
  # S2_NDBI_contrast is independent (no high correlations)
  drop_texture_correlated: [S2_NDBI_homogeneity]

# Transformation
transform:
  # Features to log1p (from EDA distribution_statistics.csv)
  log1p_features: [B4, B8, viirs_mean, S2_NDBI_contrast, pop_total, age_u15,
                   age_65_plus, osm_built_area, osm_built_ratio]
  scaler: "robust"   # "robust" or "standard"

# Identifiers to keep (not scaled, not used as features)
identifiers: [unit_id, pref_name]
